spring:
  redis:
    # 主 机 地 址
    host: 127.0.0.1
    # 端 口
    port: 6379
    # 认 证
    password:
    # 选 择 数 据 库
    database: 1
    # 连 接 池 配 置
    lettuce:
      pool:
        # 连接池中的最大空闲连接
        max-active: 20
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1
        # 连接池中的最大空闲连接
        max-idle: 4
        # 连接池中的最小空闲连接
        min-idle: 0
    # 超时时间
    timeout: 1000

