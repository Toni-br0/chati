    #password: ENC(uhn5qOhpy6rbw/k1e4fTdWyRaEXXnmmd)

  # 数据源配置
  datasource:
    # 连接池配置
    druid:
      filters: stat,wall
      maxActive: 20
      initialSize: 1
      maxWait: 60000
      minIdle: 10
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 'x'
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      maxOpenPreparedStatements: 20
      logAbandoned: true  # 连接泄露时打印日志
      removeAbandoned: true  # 自动回收超时连接
      removeAbandonedTimeout: 360  # 超时时间(秒)
      poolPreparedStatements: true  # 开启PS缓存
      maxPoolPreparedStatementPerConnectionSize: 20  # 每个连接的PS缓存大小
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: /druid/*,*js,*gif,*jpg,*bmp,*png,*css,*ico
        session-stat-enable: true
        session-stat-max-count: 10
        principal-session-name: session_name
        principal-cookie-name: cookie_name
        profile-enable: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        aop-patterns: com.pearadmin.*
