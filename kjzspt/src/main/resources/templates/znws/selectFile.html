<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('选择文件')"/>
</head>
<body>
<form class="layui-form" id="fileForm">
    <div class="mainBox" style="bottom: 0;">
        <div class="main-container">
            <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span>文件类型</label>
                <div class="layui-input-block">
                    <select name="fileType" id="fileType" lay-filter="selectFileType">
                        <option value="">正在加载类型...</option>
                    </select>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label"><span style="color:red;">*</span>文件名称</label>
                <div class="layui-input-block">
                    <select name="fileName" id="fileName" lay-filter="selectFileName">
                        <option value="">请先选择文件类型</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</form>
<th:block th:include="include :: footer"/>
<script>
    // 修改 script 逻辑
    layui.use(['form', 'jquery', 'layer'], function() {
        var form = layui.form, $ = layui.$, layer = layui.layer;

        // 1. 初始化：加载报告文件类型字典
        function loadDicts() {
            $.get('/znfx/reportFileTypes', function(res) {
                if(res.success) {
                    var $fileType = $('#fileType').empty();
                    $.each(res.data, function(i, item) {
                        $fileType.append(new Option(item.dataLabel, item.dataValue));
                    });
                    form.render('select');
                    // 加载完字典后，根据默认选中的类型加载文件列表
                    loadFileNames();
                }
            });
        }

        // 2. 加载文件列表
        function loadFileNames() {
            var fileType = $('#fileType').val();
            if(!fileType) return;

            var loading = layer.load(2, { shade: 0.1 });
            $.ajax({
                url: '/znfx/systemFiles',
                type: 'GET',
                data: { fileType: fileType, keyword: "" },
                success: function(result) {
                    var $fileName = $('#fileName').empty();
                    if(result.success && result.data.length > 0) {
                        $.each(result.data, function(i, item) {
                            $fileName.append(new Option(item.modelName, item.id));
                        });
                    } else {
                        $fileName.append('<option value="">暂无可见文件</option>');
                    }
                    form.render('select');
                },
                complete: function() { layer.close(loading); }
            });
        }

        // 监听类型切换
        form.on('select(selectFileType)', function() {
            loadFileNames();
        });

        loadDicts(); // 启动

        // 提交逻辑中记得带上 fileType，以便 analyzeSysFile 知道去哪张表读物理文件
        window.submitForm = function() {
            var res = {
                fileId: $('#fileName').val(),
                fileName: $('#fileName option:selected').text(),
                fileType: $('#fileType').val() // 关键：回传类型
            };
            if(!res.fileId) return layer.msg('请选择文件');
            parent.$("#selectedFileInfo").val(JSON.stringify(res));
            parent.layer.close(parent.layer.getFrameIndex(window.name));
        };
    });
</script>
</body>
</html>
